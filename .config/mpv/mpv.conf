## General ##
profile=high-quality # mpv's maintained high-quality baseline
vo=gpu-next # Modern libplacebo GPU renderer
hwdec=vaapi-copy # Intel iGPU: VAAPI is verified working; copy-back keeps filters/scalers compatible
gpu-hwdec-interop=vaapi # Prefer VAAPI interop; avoids probing unsupported Vulkan Video decode
gpu-api=vulkan # Use Vulkan for GPU rendering
autofit=30% # Start mpv with a % smaller resolution of your screen
osd-bar=no # Don't show a huge volume box on screen when turning the volume up/down
cursor-autohide=100 # Cursor hide in ms
save-position-on-quit=yes # Save playback position when quitting mpv

## Language & subtitles ##
alang=jp,jpn,ja,en,eng # Language priority for audio
slang=jp,jpn,ja,en,eng # Language priority for subtitles
sub-auto=fuzzy
demuxer-mkv-subtitle-preroll=yes # Show subtitles correctly after seeking in MKV files

## Streaming ##
ytdl-format=bestvideo[vcodec^=avc1][height<=?1080]+bestaudio/bestvideo[vcodec^=vp9][height<=?1080]+bestaudio/bestvideo[height<=?1080]+bestaudio/best[height<=?1080]/best # Prefer 1080p H.264/VP9 over AV1 for better hardware decoding.
demuxer-max-bytes=150000000 # Max pre-load for network streams (1 MiB = 1048576 Bytes).
demuxer-max-back-bytes=75000000 # Max loaded video kept after playback.
force-seekable=yes
ytdl-raw-options=sub-langs=en.*,write-subs=,write-auto-subs= # Load English manual/auto subtitles when available.

## High-quality screenshots ##
screenshot-format=webp
screenshot-webp-lossless=yes
screenshot-high-bit-depth=yes
screenshot-sw=no
screenshot-directory="~/screenshots"
screenshot-template="%f-%wH.%wM.%wS.%wT-#%#00n"

# Keep profiles at the bottom. In mpv.conf, a profile header applies to all
# following options until the next profile header.
[anime]
## Anime video quality ##
scale=ewa_lanczossharp # High-quality luma upscaler for sharp line art
cscale=ewa_lanczossharp # High-quality chroma upscaler for color edges
dscale=mitchell # Balanced downscaler: avoids excessive sharpness/ringing
scale-antiring=0.7 # Reduce halos/ringing around sharp lines
cscale-antiring=0.7 # Reduce chroma ringing
dscale-antiring=0.7 # Reduce downscale ringing

## Anime banding cleanup ##
deband=yes # Reduce visible bands in gradients/dark scenes
deband-iterations=2 # Usually enough without over-smoothing detail
deband-threshold=35 # Debanding strength
deband-range=16 # Sampling range for detecting bands
deband-grain=4 # Add subtle grain so debanded gradients do not look plastic
sub-ass-override=no # Preserve fansub ASS styling/typesetting/karaoke

## Optional anime frame pacing/smoothing ##
# Enable these if 24fps anime judders on your display. Leave disabled if you prefer
# native frame pacing or notice audio pitch/tempo weirdness.
#video-sync=display-resample # Sync video to display refresh by slightly resampling audio
#interpolation=yes # Smooth motion when video FPS does not match display refresh
#tscale=oversample # Low-artifact interpolation kernel; avoids soap-opera-style smoothing
