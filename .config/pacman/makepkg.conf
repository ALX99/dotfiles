#!/bin/bash
# shellcheck disable=2034

# Use all CPU threads for makepkg's own parallel tasks and make-based builds.
NPROC="$(nproc)"
MAKEFLAGS="-j${NPROC}"

# Build on tmpfs for faster local builds. Large packages may need more than /tmp has.
BUILDDIR=/tmp/makepkg

# Do not build split debug packages by default for AUR/local builds.
# Use a prefix match so an existing "!debug" entry is not rewritten to "!!debug".
OPTIONS=("${OPTIONS[@]/#debug/!debug}")
